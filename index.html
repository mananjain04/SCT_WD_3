<!DOCTYPE html>
<html>
<head>
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
    <h1>General Knowledge Quiz</h1>
    
    <div id="quiz-area">
        <div id="question-container">
            <h2 id="question">Question text goes here</h2>
            <div id="answer-buttons" class="btn-grid">
                <!-- Answer buttons will be injected here -->
            </div>
            <div id="fill-in-blank-container" style="display:none;">
                <input type="text" id="answer-input" placeholder="Type your answer here">
                <button id="submit-answer-btn" class="btn">Submit Answer</button>
            </div>
        </div>
        <button id="next-btn" class="btn hide">Next Question</button>
    </div>
    
    <div id="score-area" class="hide">
        <h2>Your Score: <span id="score">0</span> out of <span id="total-questions">0</span></h2>
        <button id="restart-btn" class="btn">Restart Quiz</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
